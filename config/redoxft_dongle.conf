# Redox FT Dongle central config
# Dongle:
#  - jest BLE central (rozmawia z 2 peripherals: lewa, prawa)
#  - jest USB HID (gada z komputerem)
#  - obsługuje ZMK Studio (edycja keymap przez USB)

CONFIG_ZMK_KEYBOARD_NAME="Redox FT Dongle"

# Split central
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# BLE connections: 5 host BT profiles + 2 peripheral halves = 7
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# Battery levels od peripheralów
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ZMK Studio - tu, bo dongle jest USB
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_USB=y

# Pointing - mysz emulation (bo keymap ma mouse behaviors)
CONFIG_ZMK_POINTING=y

# Sleep - mało ważne dla USB dongle, ale niegroźne
CONFIG_ZMK_SLEEP=y
