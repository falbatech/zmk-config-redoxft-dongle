# RGB - 35 LEDów per-key na każdej połówce
CONFIG_ZMK_RGB_UNDERGLOW=y

# Wyświetlacz nice!view
# CONFIG_ZMK_DISPLAY=y

# Moc nadawcza BT
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep + nazwa klawiatury
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_KEYBOARD_NAME="Redox FT"

# ZMK Studio
CONFIG_ZMK_STUDIO=y

# Pointing
CONFIG_ZMK_POINTING=y

# Eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7
