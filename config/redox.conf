# Redox FT - common config dla peripheralów (lewa i prawa połówka)

# RGB - 35 LEDów per-key na każdej połówce
CONFIG_ZMK_RGB_UNDERGLOW=y

# Wyświetlacz nice!view (wyłączony, aktywuj jeśli masz)
# CONFIG_ZMK_DISPLAY=y

# Moc nadawcza BT - wzmocniona, lepszy zasięg do dongla
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep - oszczędza baterię gdy klawiatura nie używana
CONFIG_ZMK_SLEEP=y

# UWAGA: ZMK_STUDIO jest TYLKO na donglu (nie tu)
# Studio gada przez USB ktore jest na donglu

# Pointing - mysz emulation
CONFIG_ZMK_POINTING=y

# Eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7
