# Redox FT - config dla obu peripherals (lewa i prawa)
# To jest plik ładowany przez ZMK dla każdego shielda używającego keymap "redox"

# Role peripheral wymuszone PRZEZ cmake-args w build.yaml
# (jawne CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n nie tu, bo build.yaml już to robi)

# RGB
CONFIG_ZMK_RGB_UNDERGLOW=y

# BT power boost - lepszy zasięg do dongla
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep dla baterii
CONFIG_ZMK_SLEEP=y

# Eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Wyświetlacz nice!view wyłączony
# CONFIG_ZMK_DISPLAY=y
