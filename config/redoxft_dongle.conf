# Redox FT Dongle - central, USB, Studio
CONFIG_ZMK_KEYBOARD_NAME="Redox FT Dongle"

# Split central (2 peripherals: lewa, prawa)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# BLE connections: 5 BT profiles + 2 peripheral halves = 7
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# Battery od peripheralów
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Mocniejszy BT na donglu - lepszy zasięg do peripheralów
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ZMK Studio przez USB
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_USB=y

# Pointing (mysz)
CONFIG_ZMK_POINTING=y

# UWAGA: NIE włączamy CONFIG_ZMK_SLEEP na donglu!
# Dongle musi cały czas skanować peripherals
# Sleep na donglu = peripherals nie znajdują central
# CONFIG_ZMK_SLEEP=n  (default n, więc nic nie wpisujemy)
